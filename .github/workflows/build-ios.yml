name: Build iOS IPA (unsigned)

on:
  push:
    branches: [main]
    paths: ['www/**', 'capacitor.config.json', '.github/workflows/build-ios.yml']
  workflow_dispatch:

jobs:
  ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Install Capacitor & generate iOS project
        run: |
          npm install
          npx cap add ios
          npx cap sync ios

      - name: Build (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r Craftly-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Craftly-IPA-unsigned
          path: Craftly-unsigned.ipa

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Craftly-unsigned.ipa
