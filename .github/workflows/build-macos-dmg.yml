name: Build macOS DMG (unsigned)

on:
  push:
    branches: [main]
    paths: ['www/**', 'desktop/**', '.github/workflows/build-macos-dmg.yml']
  workflow_dispatch:

jobs:
  dmg:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Sync web assets into desktop shell
        run: |
          rm -rf desktop/www
          cp -r www desktop/www

      - name: Install & build DMG (unsigned)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTODISCOVERY: "false"
        run: |
          npm install
          npx electron-builder --mac dmg --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: Craftly-DMG-unsigned
          path: desktop/dist/*.dmg

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.dmg
