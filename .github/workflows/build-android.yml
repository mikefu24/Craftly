name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
    paths: ['www/**', 'capacitor.config.json', '.github/workflows/build-android.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install Capacitor & generate Android project
        run: |
          npm install
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Craftly.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Craftly-APK
          path: Craftly.apk

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Craftly.apk
